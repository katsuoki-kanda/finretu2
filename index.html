<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Finger Number Game - Super Large Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Helvetica Neue', Arial, sans-serif; }
        #container { position: relative; width: 100vw; height: 100vh; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); }
        
        #ui-layer { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; z-index: 10;
        }
        .header-ui { 
            display: flex; justify-content: space-around; align-items: center;
            background: rgba(0,0,0,0.85); height: 50px; width: 100%;
            border-bottom: 2px solid #0f0; color: #0f0; font-size: 26px; font-weight: bold;
        }
        .val-text { color: #fff; margin-left: 10px; }
        
        #msg { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            text-align: center; font-size: 45px; color: #fff; text-shadow: 0 0 15px #f00;
            background: rgba(0,0,0,0.8); padding: 30px; border-radius: 20px; border: 3px solid #fff;
        }
    </style>
</head>
<body>

<div id="container">
    <video id="input_video" style="display:none;"></video>
    <canvas id="output_canvas"></canvas>
    <div id="ui-layer">
        <div class="header-ui">
            <div>SCORE: <span id="score" class="val-text">0</span></div>
            <div>TIME: <span id="timer" class="val-text">60</span></div>
        </div>
        <div id="msg">カメラを起動中...</div>
    </div>
</div>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const scoreEl = document.getElementById('score');
    const timerEl = document.getElementById('timer');
    const msgEl = document.getElementById('msg');

    let score = 0;
    let currentIndex = 0;
    let gameStarted = false;
    let startTime = 0;
    const gameDuration = 60;
    let circles = [];
    
    // 配置設定
    const COLS = 8;
    const ROWS = 5;
    const UI_MARGIN_TOP = 70; 

    // 動的に計算されるサイズ
    let currentCircleR = 40;
    let currentFontSize = 35;
    let lastNumberFromPreviousScreen = -1;

    const synth = window.speechSynthesis;
    function speak(text) {
        if (synth.speaking) synth.cancel();
        const uttr = new SpeechSynthesisUtterance(text);
        uttr.lang = 'ja-JP';
        synth.speak(uttr);
    }

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function beep() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.value = 1150;
        gain.gain.value = 0.05;
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.06);
    }

    // サークル生成ロジック
    function initCircles() {
        circles = [];
        const width = window.innerWidth;
        const height = window.innerHeight - UI_MARGIN_TOP;
        
        const stepX = width / (COLS + 1);
        const stepY = height / (ROWS + 1);

        // 半径を計算
        currentCircleR = Math.min(stepX, stepY) * 0.45;
        currentFontSize = currentCircleR * 1.2; 

        let trackingLastNum = lastNumberFromPreviousScreen;

        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                let num;
                do {
                    num = Math.floor(Math.random() * 10) + 1;
                } while (num === trackingLastNum);
                
                trackingLastNum = num;

                // Y座標から半径(currentCircleR)を引くことで全体を上へ移動
                circles.push({
                    x: width - (stepX * (c + 1)), 
                    y: UI_MARGIN_TOP + (stepY * (r + 1)) - currentCircleR,
                    val: num,
                    cleared: false
                });
            }
        }
        lastNumberFromPreviousScreen = trackingLastNum;
    }

    function onResults(results) {
        if (canvasElement.width !== window.innerWidth || canvasElement.height !== window.innerHeight) {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
            if (gameStarted) initCircles();
        }

        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

        let totalFingers = 0;
        let startTrigger = false;

        if (results.multiHandLandmarks) {
            for (let i = 0; i < results.multiHandLandmarks.length; i++) {
                const landmarks = results.multiHandLandmarks[i];
                const isLeft = results.multiHandedness[i].label === 'Right'; 

                let fingers = 0;
                if (isLeft ? landmarks[4].x < landmarks[3].x : landmarks[4].x > landmarks[3].x) fingers++;
                if (landmarks[8].y < landmarks[6].y) fingers++;
                if (landmarks[12].y < landmarks[10].y) fingers++;
                if (landmarks[16].y < landmarks[14].y) fingers++;
                if (landmarks[20].y < landmarks[18].y) fingers++;

                totalFingers += fingers;
                if (landmarks[0].y < 0.3) startTrigger = true; 

                drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 1.5});
            }
        }

        if (!gameStarted) {
            msgEl.style.display = "block";
            msgEl.innerHTML = "手を高く挙げて<br>スタート！";
            if (startTrigger) {
                lastNumberFromPreviousScreen = -1;
                startGame();
            }
        } else {
            updateGame(totalFingers);
        }
        canvasCtx.restore();
    }

    function startGame() {
        gameStarted = true;
        score = 0;
        currentIndex = 0;
        startTime = Date.now();
        initCircles();
        msgEl.style.display = "none";
        speak("スタート");
    }

    function updateGame(fingers) {
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        const remaining = Math.max(0, gameDuration - elapsed);
        
        timerEl.innerText = remaining;
        scoreEl.innerText = score;

        if (remaining <= 0) {
            gameStarted = false;
            msgEl.style.display = "block";
            msgEl.innerHTML = `終了！<br>SCORE: ${score}<br><span style="font-size:25px">手を挙げてリスタート</span>`;
            speak(`終了。${score}点でした。`);
            return;
        }

        if (currentIndex < circles.length) {
            if (fingers === circles[currentIndex].val) {
                circles[currentIndex].cleared = true;
                score++;
                currentIndex++;
                beep();
                
                if (currentIndex === circles.length) {
                    initCircles();
                    currentIndex = 0;
                }
            }
        }

        circles.forEach((c, idx) => {
            if (c.cleared) return;

            const isTarget = (idx === currentIndex);
            
            canvasCtx.beginPath();
            canvasCtx.arc(c.x, c.y, currentCircleR, 0, Math.PI * 2);
            canvasCtx.fillStyle = isTarget ? "rgba(255, 255, 0, 0.95)" : "rgba(255, 0, 0, 0.65)";
            canvasCtx.fill();
            canvasCtx.strokeStyle = "#fff";
            canvasCtx.lineWidth = isTarget ? 7 : 1.5;
            canvasCtx.stroke();
            
            canvasCtx.save();
            canvasCtx.translate(c.x, c.y);
            canvasCtx.scale(-1, 1); 
            canvasCtx.fillStyle = isTarget ? "#000" : "#fff";
            canvasCtx.font = `bold ${currentFontSize}px Arial`;
            canvasCtx.textAlign = "center";
            canvasCtx.textBaseline = "middle";
            canvasCtx.fillText(c.val, 0, 0);
            canvasCtx.restore();
        });
    }

    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });
    hands.setOptions({
        maxNumHands: 2,
        modelComplexity: 1,
        minDetectionConfidence: 0.6,
        minTrackingConfidence: 0.6
    });
    hands.onResults(onResults);

    const camera = new Camera(videoElement, {
        onFrame: async () => {
            await hands.send({image: videoElement});
        },
        width: 1280,
        height: 720
    });
    camera.start();

    window.addEventListener('resize', () => {
        if (gameStarted) initCircles();
    });

</script>
</body>
</html>
